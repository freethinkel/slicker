# ─── User Tmux Overrides ──────────────────────────────────────────────
# This file is sourced after the base tmux config.
# Add your personal tmux settings here.

# Example: change prefix
# set -g prefix C-a

# Example: override theme colors
# set -g status-left "#[fg=black,bg=green,bold] #S #[bg=default] "

# Example: add custom keybindings
# bind m split-window -h "htop"

# Example: tmux plugin manager (tpm)
# Install: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Then reload tmux (prefix + q) and press prefix + I to install plugins.
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# run '~/.tmux/plugins/tpm/tpm'
